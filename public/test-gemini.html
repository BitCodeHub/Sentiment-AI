<!DOCTYPE html>
<html>
<head>
    <title>Gemini API Test</title>
    <script type="importmap">
        {
            "imports": {
                "@google/generative-ai": "https://esm.run/@google/generative-ai"
            }
        }
    </script>
</head>
<body>
    <h1>Gemini API Test</h1>
    <button id="testBtn">Test Gemini API</button>
    <pre id="output"></pre>

    <script type="module">
        import { GoogleGenerativeAI } from '@google/generative-ai';
        
        const API_KEY = 'AIzaSyCJP6OG7y82p0Eju_Qv-GsUeaWz-vjhvRg';
        const output = document.getElementById('output');
        
        document.getElementById('testBtn').addEventListener('click', async () => {
            output.textContent = 'Testing...\n';
            
            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                
                const models = [
                    'gemini-1.5-flash',
                    'gemini-1.5-flash-latest',
                    'gemini-2.0-flash',
                    'gemini-2.5-flash',
                    'gemini-1.5-pro',
                    'gemini-1.5-pro-latest'
                ];
                
                for (const modelName of models) {
                    output.textContent += `\nTrying ${modelName}...\n`;
                    
                    try {
                        const model = genAI.getGenerativeModel({ model: modelName });
                        const result = await model.generateContent('Say "Hello World"');
                        const response = await result.response;
                        const text = response.text();
                        
                        output.textContent += `✅ ${modelName} works! Response: ${text}\n`;
                        break;
                    } catch (err) {
                        output.textContent += `❌ ${modelName} failed: ${err.message}\n`;
                    }
                }
            } catch (err) {
                output.textContent += `\nError: ${err.message}\n`;
            }
        });
    </script>
</body>
</html>
